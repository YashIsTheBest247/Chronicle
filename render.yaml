# Render blueprint. In Render: New → Blueprint → point at this repo.
#
# Chronicle is ONE service — the Next.js app serves both the UI and the API
# routes under /api. There is no separate backend to deploy.
#
# The database is deliberately NOT defined here: Render's free Postgres is
# deleted 30 days after creation. Use Neon (or Supabase) and paste the
# connection string into DATABASE_URL below.

services:
  - type: web
    name: chronicle
    runtime: node
    plan: free
    # `npm ci` installs devDependencies too — Next needs TypeScript and
    # Tailwind at build time, so do not add --omit=dev here.
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"

      # --- required: database + AI ----------------------------------------
      # Postgres with pgvector (Neon). Chronicle creates its own tables and
      # the HNSW index on the first signed-in request.
      - key: DATABASE_URL
        sync: false
      # https://aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false

      # --- required: Google sign-in ---------------------------------------
      # Records are per-account, so the app cannot run without auth.
      # Authorised redirect URI in Google Cloud Console must be exactly:
      #   https://<this-service>.onrender.com/api/auth/callback/google
      - key: AUTH_GOOGLE_ID
        sync: false
      - key: AUTH_GOOGLE_SECRET
        sync: false
      # Signs the session cookie. Render generates one; never reuse it across
      # environments, and changing it signs everybody out.
      - key: AUTH_SECRET
        generateValue: true

      # --- optional: Telegram bot -----------------------------------------
      # Leave blank to disable. Access is per-account: each user links their
      # own chat from Settings, so there is no allowlist to configure.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      # Public link behind the landing page's "Chat on Telegram" button.
      # NEXT_PUBLIC_* is inlined at BUILD time — changing it needs a rebuild,
      # not just a restart.
      - key: NEXT_PUBLIC_TELEGRAM_URL
        sync: false
